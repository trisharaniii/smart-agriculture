<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<title>Forgot Password</title>
<link rel="stylesheet" href="style.css">
<style>
/* Same body theme as index.html */
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    width: 100%;
    background-image: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    display: flex;
    justify-content: center;
    align-items: center;
}

body::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.3);
    z-index: -1;
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 10px;
    width: 320px;
    text-align: center;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}

.logo { width: 120px; margin-bottom: 20px; }

.login-box input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    box-sizing: border-box;
}

.login-box button {
    width: 100%;
    padding: 10px;
    background: #2e7d32;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 15px;
    margin-top: 10px;
}
.login-box button:hover { background: #1b5e20; }
.login-box button:disabled { background: #999; cursor: not-allowed; }

.register-text a {
    color: #555;
    text-decoration: none;
    font-size: 14px;
}
.register-text a:hover { color: #2e7d32; }
</style>
</head>
<body>

<div class="login-box">
    <img src="logo.png" class="logo">
    <h2 style="margin-top:0; font-size:20px; color:#333;">Reset Password</h2>
    
    <p id="forgotMessage" style="color:red; font-size:14px; margin-bottom:10px; display:none;"></p>

    <!-- Mobile Number Step -->
    <div id="step1">
        <input type="text" id="resetMobile" placeholder="Registered Mobile Number">
        <button onclick="sendResetOTP()" id="btnSendOTP">Send OTP</button>
    </div>

    <!-- OTP & Password Step (Hidden initially) -->
    <div id="step2" style="display:none;">
        <input type="text" id="resetOTP" placeholder="Enter OTP">
        <input type="password" id="resetNewPassword" placeholder="New Password (min 6 chars)">
        <input type="password" id="resetConfirmPassword" placeholder="Confirm Password">
        <button onclick="resetPassword()" id="btnResetPass">Update Password</button>
    </div>

    <p class="register-text" style="margin-top:20px;">
        <a href="index.html">Go Back to Login</a>
    </p>
</div>

<script src="script.js"></script>

</body>
</html>
